# prek hook configuration (pre-commit compatible).
# Run before every commit; mandatory, never bypassed with --no-verify.
repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -l -w
        language: system
        types: [go]
      - id: govet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
      - id: gobuild
        name: go build
        entry: go build ./...
        language: system
        pass_filenames: false
      - id: gotest
        name: go test
        entry: go test ./...
        language: system
        pass_filenames: false
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --timeout=5m
        language: system
        pass_filenames: false
        types: [go]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: mixed-line-ending
